<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ restaurant_name }} — QueueQ Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d1117; color: #e6edf3;
  padding: 16px; max-width: 480px; margin: 0 auto;
}
h1 { font-size: 20px; margin-bottom: 2px; }
.sub { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat-box { flex: 1; background: #161b22; border-radius: 12px; padding: 12px; text-align: center; }
.stat-box .num { font-size: 28px; font-weight: 800; color: #e74c3c; }
.stat-box .label { font-size: 11px; color: #8b949e; }

.next-btn {
  width: 100%; padding: 20px; border: none; border-radius: 14px;
  font-size: 20px; font-weight: 800; cursor: pointer; margin-bottom: 16px;
  background: #238636; color: #fff; transition: all .15s;
}
.next-btn:active { transform: scale(0.97); }
.next-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

.queue { list-style: none; }
.queue-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: #161b22; border: 1px solid #30363d;
  border-radius: 12px; margin-bottom: 6px;
}
.queue-item .ticket { font-size: 18px; font-weight: 800; width: 60px; }
.queue-item .size { color: #8b949e; font-size: 14px; flex: 1; }
.queue-item .badge { font-size: 12px; padding: 2px 8px; border-radius: 6px; }
.badge.review { background: #12291a; color: #3fb950; }
.badge.noreview { background: #290a0a; color: #f85149; }
.badge.waiting { color: #8b949e; background: #21262d; }

.empty { text-align: center; padding: 40px; color: #484f58; }
#confirm-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  align-items: center; justify-content: center; padding: 20px; z-index: 100;
}
#confirm-modal.show { display: flex; }
.modal-card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; }
.modal-card h2 { font-size: 32px; font-weight: 800; color: #e74c3c; margin-bottom: 4px; text-align: center; }
.modal-card p { color: #8b949e; text-align: center; margin-bottom: 20px; font-size: 14px; }
.modal-card .free-dish { background: #12291a; border: 1px solid #238636; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #3fb950; text-align: center; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
.modal-actions .btn:active { transform: scale(0.97); }
.btn-seat { background: #238636; color: #fff; }
.btn-skip { background: #21262d; color: #8b949e; }

.three-dots { text-align: center; color: #484f58; padding: 8px; font-size: 12px; }
</style>
</head>
<body>
<h1>🏪 {{ restaurant_name }}</h1>
<p class="sub">Passcode: <strong>{{ passcode }}</strong></p>
<div class="stats">
  <div class="stat-box"><div class="num" id="waiting-num">-</div><div class="label">Waiting</div></div>
  <div class="stat-box"><div class="num" id="called-num">-</div><div class="label">Called now</div></div>
</div>

<button class="next-btn" id="next-btn">🔔 Call Next</button>

<div id="queue-list"><div class="empty">No one waiting</div></div>
<div class="three-dots">••• queue refreshes automatically •••</div>

<div id="confirm-modal">
  <div class="modal-card" id="call-result">
    <h2 id="call-ticket">#-</h2>
    <p id="call-size">Party of -</p>
    <div id="review-badge" class="free-dish">
      🍜 Left a Google review → Free dish!
    </div>
    <div class="modal-actions">
      <button class="btn btn-seat" onclick="confirmSeat()">✅ Seated</button>
      <button class="btn btn-skip" onclick="skipCall()">⏭️ No-show (skip)</button>
    </div>
  </div>
</div>

<script>
const RID = '{{ restaurant_id }}';
const PASSCODE = '{{ passcode }}';
let currentCalledEntry = null;
let pollTimer = null;

function poll() {
  fetch(`/api/queue/${RID}/status`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('waiting-num').textContent = data.stats.waiting || 0;
      document.getElementById('called-num').textContent = data.stats.called || 0;

      const list = document.getElementById('queue-list');
      if (data.waiting.length === 0) {
        list.innerHTML = '<div class="empty">No one waiting</div>';
        return;
      }

      list.innerHTML = data.waiting.map(e => {
        const mins = Math.floor((e.wait_seconds || 0) / 60);
        const review = e.review_opened || e.review_confirmed
          ? `<span class="badge review">✅ Review</span>`
          : `<span class="badge noreview">📝 Review</span>`;
        return `<div class="queue-item">
          <span class="ticket">#${e.ticket_number}</span>
          <span class="size">Party of ${e.party_size} · ${mins}m</span>
          ${review}
        </div>`;
      }).join('');
    })
    .catch(() => {});
}

document.getElementById('next-btn').addEventListener('click', () => {
  const btn = document.getElementById('next-btn');
  btn.disabled = true; btn.textContent = '⏳ Calling...';

  const fd = new FormData();
  fd.append('restaurant_id', RID);
  fd.append('passcode', PASSCODE);

  fetch('/api/queue/call', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(data => {
      if (data.error === 'empty_queue') {
        btn.textContent = '🔔 Call Next';
        btn.disabled = false;
        return;
      }
      currentCalledEntry = data.entry_id;
      document.getElementById('call-ticket').textContent = `#${data.ticket_number}`;
      document.getElementById('call-size').textContent = `Party of ${data.party_size}`;
      document.getElementById('review-badge').style.display = data.review_opened || data.review_confirmed ? 'block' : 'none';
      document.getElementById('confirm-modal').classList.add('show');
      btn.textContent = '🔔 Call Next';
      btn.disabled = false;
      poll(); // refresh
    })
    .catch(() => {
      btn.textContent = '🔔 Call Next';
      btn.disabled = false;
    });
});

function confirmSeat() {
  const fd = new FormData();
  fd.append('entry_id', currentCalledEntry);
  fd.append('restaurant_id', RID);
  fd.append('passcode', PASSCODE);
  fetch('/api/queue/seat', { method: 'POST', body: fd })
    .then(() => {
      document.getElementById('confirm-modal').classList.remove('show');
      currentCalledEntry = null;
      poll();
    });
}

function skipCall() {
  const fd = new FormData();
  fd.append('entry_id', currentCalledEntry);
  fd.append('restaurant_id', RID);
  fd.append('passcode', PASSCODE);
  fd.append('status', 'cancelled');
  // Cancel via seat with negative, or just hide modal and re-call
  document.getElementById('confirm-modal').classList.remove('show');
  currentCalledEntry = null;
  poll();
}

// Initial + poll every 10s
poll();
pollTimer = setInterval(poll, 10000);
</script>
</body>
</html>
